<head>

<script>
(function(){
    var DOMAIN = "{{DOMAIN}}";
    var UUID   = "{{UUID}}";
    var WS_PATH_ENC = "{{WS_PATH_ENC}}";

    var link = "vless://" + UUID
             + "@" + DOMAIN + ":443"
             + "?encryption=none&security=tls&sni=" + DOMAIN
             + "&type=ws&host=" + DOMAIN
             + "&path=" + WS_PATH_ENC
             + "#Railway-VLESS";

    document.getElementById("linkBox").textContent = link;
    document.getElementById("openBtn").href = link;

    document.getElementById("copyBtn").addEventListener("click", function(e){
        e.preventDefault();
        navigator.clipboard.writeText(link).then(function(){
            var b = document.getElementById("copyBtn");
            b.textContent = "Скопировано ✓";
            setTimeout(function(){ b.textContent = "Скопировать"; }, 1500);
        });
    });

    try {
        // Use typeNumber 0 = auto-detect smallest version that fits, M = medium error correction.
        var qr = qrcode.create(0, "M");
        qr.addData(link);
        qr.make();
        var dataURL = qr.createDataURL(4, 2);
        var img = document.createElement("img");
        img.src = dataURL;
        var wrap = document.getElementById("qrWrap");
        wrap.innerHTML = "";
        wrap.appendChild(img);
    } catch (err) {
        document.getElementById("qrWrap").innerHTML =
            '<span style="color:#333;font-size:12px">QR недоступен, используйте ссылку ниже</span>';
    }
})();
</script>
