worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log off;
    client_max_body_size 1m;
    # Hide nginx version on error pages.
    server_tokens off;

    # Temp paths under /tmp so nginx works as non-root without extra perms.
    client_body_temp_path /tmp/nginx_client;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream xray_backend {
        server 127.0.0.1:10000;
        keepalive 16;
    }

    # --- HTTPS server (real Let's Encrypt TLS) ---
    server {
        listen 8080 ssl;
        listen [::]:8080 ssl;
        http2 on;
        server_name soul-vpn.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/soul-vpn.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/soul-vpn.duckdns.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- QR page (secret URL) ---
        location = {{QR_PATH}} {
            root /app/www;
            try_files /qr-runtime.html =404;
        }

        # --- WebSocket -> Xray (secret path) ---
        location {{WS_PATH}} {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
            proxy_buffering off;
        }

        # --- Everything else: fake fallback site ---
        location / {
            root /app/www;
            index fallback.html;
            try_files $uri /fallback.html;
        }
    }
}
