worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    client_max_body_size 1m;
    # Hide nginx version on error pages for better stealth.
    server_tokens off;

    # Temp paths under /tmp so nginx works as non-root without extra perms.
    client_body_temp_path /tmp/nginx_client;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream xray_backend {
        server 127.0.0.1:10000;
        keepalive 16;
    }

    server {
        listen {{PORT}} default_server;
        listen [::]:{{PORT}} default_server;
        server_name _;

        # --- QR page (secret URL) ---
        location = {{QR_PATH}} {
            root /app/www;
            try_files /qr.html =404;
        }

        # --- WebSocket → Xray (secret path) ---
        location {{WS_PATH}} {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            send_timeout 300s;
            proxy_buffering off;
        }

        # --- Everything else: fake fallback site ---
        location / {
            root /app/www;
            index fallback.html;
            try_files $uri /fallback.html;
        }
    }
}
